<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="color-scheme" content="light dark" />
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0, initial-scale=1.0">
            <meta http-equiv="Content-Security-Policy" content="default-src 'self' blob:; font-src 'self' data: blob:; script-src 'self' 'unsafe-inline'; style-src 'self' blob: 'unsafe-inline'; img-src 'self' blob: data:; connect-src 'self' blob: data: *; frame-src blob: data:; object-src blob: data:; form-action 'none';" />
            <style>
                body {
                    --active-bg: rgba(0, 0, 0, .05);
                    --side-nav-width: 28px;
                    --word-tracking-status-outline-offset: 1px;
                    --page-read-button-height: 30px;
                    --completion-action-fill: color-mix(in srgb, CanvasText 16%, transparent);
                    --word-tracking-status-size: calc(
                        var(--page-read-button-height)
                        - (var(--word-tracking-status-outline-offset) * 2)
                        - 2px - 4px
                    );
                    --word-tracking-checkmark-thickness: 0.125em;
                    --word-tracking-checkmark-left: calc(var(--word-tracking-status-size) / 9.4 + var(--word-tracking-status-size) / 16);
                    --word-tracking-checkmark-height: calc(var(--word-tracking-status-size) / 1.8);
                    --word-tracking-checkmark-width: calc(var(--word-tracking-checkmark-height) / 2.15);
                    --nav-page-read-clearance: 50px;
                    --nav-relocate-reserve: 150px;
                    --mnb-tracking-section-border-size: 2px;
                    --mnb-ebook-read-marker-padding: 1px;
                }
                @media screen and (min-width: 960px) {
                    body {
                        --side-nav-width: 58px;
                    }
                }
                @supports (color-scheme: light dark) {
                    @media (prefers-color-scheme: dark) {
                        body {
                            --active-bg: rgba(255, 255, 255, .1);
                        }
                    }
                }
                
                html {
                    height: 100%;
                }
                html, body {
                    overflow-x: hidden;
                    overscroll-behavior-x: contain;
                }
                body {
                    --mnb-red: #ff4500;
                    --secondary-color: #7a7a7a;
                    --tertiary-color: #c3c3c3;
                    --theme-background-color: white;
                    --theme-tracking-unread-color: #a5a5a5;
                    --theme-tracking-unread-active-color: #d6d6d6;
                    --theme-tracking-read-color: #308d60;
                    --nav-primary-font-size: 0.72rem;
                    --nav-secondary-font-size: calc(0.86rem + 2px);
                    --nav-accent-color: #3d3d3d;
                    --nav-horizontal-padding: 34px;
                    --nav-relocate-bg: rgba(0, 0, 0, 0.08);
                    --scrubber-progress-color: color-mix(in srgb, var(--secondary-color) 70%, white 30%);
                    --scrubber-track-rest-color: color-mix(in srgb, var(--secondary-color) 30%, transparent 70%);
                    --nav-relocate-icon-color: var(--secondary-color);
                    --nav-relocate-baseline-offset: 4px;
                    --nav-section-progress-font-size: 16px;
                    --nav-compact-percent-min-width: 72px;
                    --mnb-nav-bar-height: 54px;
                    --mnb-obscured-top-inset: 0px;
                    --mnb-toolbar-bottom-offset: 0px;
                    --mnb-obscured-bottom-inset: 0px;
                    --mnb-system-bottom-inset: env(safe-area-inset-bottom, 0px);
                    --mnb-toolbar-visual-drop: 6px;
                    --mnb-toolbar-physical-bottom-inset: max(
                        calc(var(--mnb-toolbar-bottom-offset, 0px) - var(--mnb-toolbar-visual-drop, 0px)),
                        calc(var(--mnb-obscured-bottom-inset, 0px) + var(--mnb-system-bottom-inset, 0px))
                    );
                    --nav-primary-hidden-shift-y: 14px;
                    --mnb-reader-stage-bottom-inset: calc(
                        var(--mnb-nav-bar-height)
                        + var(--mnb-toolbar-physical-bottom-inset, 0px)
                    );
                    --nav-left-aux-inset: 0px;
                    --nav-right-aux-inset: 0px;
                    --nav-side-cluster-gap: 8px;
                    --mnb-ui-font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", system-ui, sans-serif;
                    
                    margin: 0 auto;
                    height: 100%;
                    /*height: 100dvh;*/
                    font: menu;
                    font-family: var(--mnb-ui-font-family);
                }
                @media (prefers-color-scheme: dark) {
                    body {
                        --secondary-color: #7f7f7f;
                        --tertiary-color: #1e1e1e;
                        --theme-background-color: #313234;
                        --theme-tracking-unread-color: gray;
                        --theme-tracking-unread-active-color: lightgray;
                        --nav-accent-color: #d0d0d0;
                        --nav-relocate-bg: rgba(255, 255, 255, 0.14);
                    }
                }
                
                button {
                    cursor: pointer;
                }
                
                #drop-target {
                    height: 100dvh;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    text-align: center;
                    visibility: hidden;
                }
                #drop-target h1 {
                    font-weight: 900;
                }
                #file-button {
                    font: inherit;
                    background: none;
                    border: 0;
                    padding: 0;
                    text-decoration: underline;
                    cursor: pointer;
                }
                .icon {
                    width: 24px;
                    height: 24px;
                    fill: none;
                    stroke: currentcolor;
                    stroke-width: 2px;
                    flex-shrink: 0;
                }
                .sr-only {
                    position: absolute !important;
                    width: 1px !important;
                    height: 1px !important;
                    padding: 0 !important;
                    margin: -1px !important;
                    overflow: hidden !important;
                    clip: rect(0 0 0 0) !important;
                    white-space: nowrap !important;
                    border: 0 !important;
                }
                .icon.finish-icon {
                    width: 1em;
                    height: 1em;
                    min-width: 1em;
                    min-height: 1em;
                    stroke: currentcolor;
                }
                .empty-state-icon {
                    margin: auto;
                }
                .toolbar {
                    box-sizing: border-box;
                    position: absolute;
                    z-index: 4;
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    left: 0;
                    right: 0;
                    width: auto;
                    max-width: 100%;
                    height: 63px;
                    /*padding: 6px;*/
                    transition: opacity 250ms ease;
                    visibility: hidden;
                }
                .toolbar button {
                    padding: 3px 8px;
                    border-radius: 6px;
                    background: none;
                    border: 0;
                    color: var(--secondary-color);
                    display: flex;
                    align-items: center;
                    justify-content: start;
                    min-width: 0;
                    gap: 4px;
                    font-size: 12px;
                    font-weight: 600;
                }
                /* Left stack: label left, icon right */
                #left-stack .button-label {
                    order: 1;
                }
                #left-stack .icon {
                    order: 2;
                    margin-left: auto;
                }
                
                /* Right stack: label right, icon left */
                #right-stack .button-label {
                    order: 2;
                    margin-left: auto;
                }
                #right-stack .icon {
                    order: 1;
                }
                .toolbar button:hover {
                    background: rgba(0, 0, 0, .1);
                    color: currentcolor;
                }
                .toolbar button .button-label {
                    font-size: x-small;
                    font-weight: 600;
                    pointer-events: none;
                    color: inherit;
                    white-space: nowrap;
                }
                
                /* Position chapter-nav spinner inline where SVG was */
                .toolbar button .ispinner.nav-spinner {
                    display: inline-block !important;
                    position: relative !important;
                    width: 24px !important;
                    height: 24px !important;
                    vertical-align: middle !important;
                    margin: 0 !important;
                    top: 0 !important;
                    left: 0 !important;
                    transform: none !important;
                }
                
                .toolbar button[data-button-type="next"]:has(.button-label:not(:empty)) {
                    color: var(--mnb-red);
                }
                .button-stack{
                    display: grid;
                }
                .button-stack > button{
                    grid-area: 1 / 1;
                }
                .button-stack > button[hidden],
                .button-stack > button[aria-hidden="true"] {
                    display: none !important;
                }
                #nav-bar {
                    z-index: 5;
                    left: 0;
                    right: 0;
                    bottom: var(--mnb-toolbar-physical-bottom-inset, 0px);
                    height: var(--mnb-nav-bar-height) !important;
                    min-height: var(--mnb-nav-bar-height);
                    max-height: var(--mnb-nav-bar-height);
                    flex: 0 0 var(--mnb-nav-bar-height);
                    contain: layout size style;
                    padding: 0;
                }
                #reader-stage {
                    position: absolute;
                    top: var(--mnb-obscured-top-inset, 0px);
                    right: 0;
                    bottom: var(--mnb-reader-stage-bottom-inset, 0px);
                    left: 0;
                    overflow: hidden;
                    z-index: 1;
                    display: grid;
                    grid-template-rows: 0 minmax(0, 1fr);
                }
                body[data-page-read-marker-axis="block"] #reader-stage {
                    grid-template-rows: calc(var(--mnb-tracking-section-border-size) + var(--mnb-ebook-read-marker-padding)) minmax(0, 1fr);
                }
                #page-read-marker-top {
                    display: block;
                    grid-row: 1;
                    width: var(--mnb-ebook-read-marker-top-width, 100%);
                    margin-inline-start: var(--mnb-ebook-read-marker-top-left, 0px);
                    height: var(--mnb-tracking-section-border-size);
                    align-self: start;
                    border-radius: var(--mnb-tracking-section-border-size);
                    background: var(--theme-tracking-read-color);
                    opacity: 0;
                    visibility: hidden;
                    pointer-events: none;
                    contain: strict;
                }
                body[data-page-read-marker-read="true"][data-page-read-marker-axis="block"] #page-read-marker-top {
                    opacity: 1;
                    visibility: visible;
                }
                .nav-relocate-button,
                .nav-section-progress,
                #nav-section-progress-leading,
                #nav-section-progress-trailing,
                #nav-primary-text,
                #nav-primary-text-full,
                #nav-primary-text-compact,
                #nav-bottom-row,
                #progress-wrapper,
                #nav-top-row,
                #nav-hidden-buttons button,
                #btn-prev-chapter,
                #btn-next-chapter,
                .button-label,
                .side-nav,
                #nav-bar,
                #nav-bar * {
                    user-select: none;
                    -webkit-user-select: none;
                }
                #nav-bar *,
                #nav-bottom-row,
                #progress-wrapper,
                .nav-relocate-button,
                .nav-section-progress,
                #nav-section-progress-leading,
                #nav-section-progress-trailing,
                #nav-primary-text {
                    transition: opacity 240ms ease, transform 240ms ease;
                }
                .nav-fade-out {
                    opacity: 0 !important;
                    pointer-events: none !important;
                }
                #nav-content {
                    display: flex;
                    flex-direction: column;
                    width: 100%;
                    gap: 0;
                }
                #nav-top-row {
                    position: relative;
                    display: block;
                    padding: 0 var(--nav-horizontal-padding);
                    height: var(--mnb-nav-bar-height);
                    box-sizing: border-box;
                }
                #nav-primary-cluster {
                    position: absolute;
                    top: 0;
                    left: var(--nav-horizontal-padding);
                    right: var(--nav-horizontal-padding);
                    height: var(--mnb-nav-bar-height);
                    min-width: 0;
                    pointer-events: none;
                }
                #nav-primary-text {
                    font-family: var(--mnb-ui-font-family) !important;
                    font-weight: 500;
                    color: var(--secondary-color);
                    text-align: center;
                    font-size: 10px !important;
                    line-height: 12px;
                    position: absolute;
                    top: 0;
                    left: 50%;
                    display: inline-grid;
                    grid-template-columns: minmax(0, 1fr);
                    justify-items: stretch;
                    width: max-content;
                    min-width: 60px;
                    max-width: min(220px, calc(100vw - (var(--nav-horizontal-padding) * 2) - (var(--nav-relocate-reserve) * 2)));
                    white-space: nowrap;
                    direction: ltr;
                    unicode-bidi: isolate;
                    pointer-events: auto;
                    height: 26px;
                    box-sizing: border-box;
                    flex: 0 1 auto;
                    transform: translate(-50%, 0);
                }
                .nav-action-link {
                    display: inline-block;
                    background: none;
                    border: none;
                    color: inherit;
                    cursor: pointer;
                    font: inherit;
                    margin: 0;
                    padding: 0;
                    text-decoration: none;
                }
                #nav-primary-text-full,
                #nav-primary-text-compact,
                #nav-hidden-primary-text,
                #nav-hidden-primary-percent,
                #nav-hidden-overlay .nav-hidden-label,
                #nav-hidden-overlay .nav-hidden-percent,
                .nav-section-progress,
                #nav-section-progress-leading,
                #nav-section-progress-trailing,
                #nav-section-progress-center,
                #percent-jump-container,
                #percent-jump-container label,
                #percent-jump-container input,
                #percent-jump-container span,
                #percent-jump-container button {
                    font-family: var(--mnb-ui-font-family) !important;
                }
                .nav-primary-layer {
                    grid-area: 1 / 1;
                    display: block;
                    width: 100%;
                    min-width: 0;
                    max-width: 100%;
                    overflow: hidden;
                    text-overflow: ellipsis;
                    white-space: nowrap;
                    opacity: 0;
                    transform: translateY(0);
                    transition: opacity 240ms ease, transform 240ms ease;
                    text-align: center;
                }
                #nav-primary-text {
                    --label-variant: full;
                }
                #nav-primary-text[data-label-variant="full"] #nav-primary-text-full {
                    opacity: 1;
                    transform: translateY(0);
                }
                #nav-primary-text[data-label-variant="full"] #nav-primary-text-compact {
                    opacity: 0;
                    transform: translateY(0);
                }
                #nav-primary-text[data-label-variant="compact"] #nav-primary-text-full {
                    opacity: 0;
                    transform: translateY(0);
                }
                #nav-primary-text[data-label-variant="compact"] #nav-primary-text-compact {
                    opacity: 0.8;
                    transform: translateY(0);
                }
                #nav-primary-text-compact {
                    text-align: center;
                    box-sizing: border-box;
                }
                #nav-hidden-overlay {
                    display: none !important;
                }
                #nav-hidden-overlay .nav-hidden-label {
                    font-weight: 500;
                    color: var(--secondary-color);
                    font-size: 10px !important;
                    line-height: 12px;
                    white-space: nowrap;
                    text-align: center;
                    direction: ltr;
                    unicode-bidi: isolate;
                }
                #nav-hidden-overlay .nav-hidden-percent {
                    text-align: center;
                }
                #nav-hidden-primary-text {
                    pointer-events: auto;
                    display: inline-block;
                    width: max-content;
                    max-width: 100%;
                }
                #nav-bar.nav-hidden-due-to-scroll #nav-primary-text {
                    opacity: 1 !important;
                    pointer-events: auto !important;
                    transform: translate(-50%, 0);
                }
                #nav-bar.nav-hidden-due-to-scroll ~ #page-tracking-container {
                    opacity: 1 !important;
                    visibility: visible !important;
                    pointer-events: auto !important;
                }
                .nav-section-progress {
                    font-size: 10px !important;
                    font-weight: 600;
                    color: var(--secondary-color);
                    white-space: nowrap;
                    transition: opacity 375ms ease-out;
                }
                .nav-section-progress[hidden] {
                    display: none !important;
                }
                .toolbar .nav-relocate-button {
                    display: flex;
                    align-items: center;
                    justify-content: flex-start;
                    flex-direction: row;
                    gap: 4px;
                    border: none;
                    background-color: transparent;
                    color: var(--nav-relocate-icon-color, var(--secondary-color));
                    font-size: 14px;
                    font-weight: 500;
                    padding: 2px 4px;
                    border-radius: 0;
                    cursor: pointer;
                    transition: color 0.2s ease, opacity 375ms ease-out, background-color 0.2s ease;
                    direction: ltr;
                    line-height: 1;
                    pointer-events: auto;
                    flex: 0 1 auto;
                    min-width: 0;
                    width: max-content;
                    max-width: max-content;
                    position: absolute;
                    top: auto;
                    bottom: calc(
                        var(--mnb-toolbar-physical-bottom-inset, 0px)
                        + 8px
                        + ((var(--page-read-button-height) - 26px) / 2)
                    );
                    min-height: 26px;
                    height: 26px;
                    transform: none;
                    z-index: 7;
                    opacity: 0.8;
                    visibility: visible;
                }
                .toolbar .nav-relocate-button:hover,
                .toolbar .nav-relocate-button:focus-visible {
                    background-color: transparent;
                    opacity: 1;
                }
                .nav-relocate-button:disabled {
                    opacity: 0.35;
                    cursor: default;
                }
                .nav-relocate-button[hidden] {
                    display: none !important;
                }
                .nav-relocate-button[aria-hidden="true"] {
                    opacity: 0;
                    pointer-events: none;
                }
                .nav-relocate-icon {
                    display: block;
                    width: 1em;
                    height: 1em;
                    min-width: 1em;
                    min-height: 1em;
                    color: var(--nav-relocate-icon-color, currentColor);
                    fill: currentColor;
                    stroke: none;
                    flex-shrink: 0;
                }
                .nav-relocate-page {
                    display: block;
                    min-width: 0;
                    margin: 0;
                    text-align: inherit;
                    color: var(--nav-relocate-icon-color, currentColor);
                    font-size: 14px;
                    font-weight: 500;
                    line-height: 1;
                    white-space: nowrap;
                    overflow: hidden;
                    text-overflow: ellipsis;
                    direction: ltr;
                    unicode-bidi: plaintext;
                }
                #nav-bar.nav-hidden-due-to-scroll .nav-relocate-button,
                #nav-bar.nav-hidden-due-to-scroll .nav-section-progress {
                    opacity: 0;
                    pointer-events: none;
                }
                #nav-bar.nav-hidden-due-to-scroll .nav-relocate-button,
                #nav-bar.nav-hidden-due-to-scroll .nav-section-progress,
                #nav-bar.nav-hidden-due-to-scroll #nav-section-progress-leading,
                #nav-bar.nav-hidden-due-to-scroll #nav-section-progress-trailing,
                #nav-bar.nav-hidden-due-to-scroll #progress-wrapper {
                    opacity: 0;
                    pointer-events: none;
                }
                #nav-bar.nav-hidden-due-to-scroll #nav-section-progress-leading,
                #nav-bar.nav-hidden-due-to-scroll #nav-section-progress-trailing,
                #nav-bar.nav-hidden-due-to-scroll #nav-section-progress-center {
                    opacity: 0;
                    pointer-events: none;
                }
                #nav-bottom-row {
                    width: 100%;
                    padding: 5px var(--nav-horizontal-padding) 7px;
                    box-sizing: border-box;
                    display: flex;
                    align-items: center;
                    transition: opacity 375ms ease-out;
                }
                #progress-slider {
                    flex-grow: 1;
                    margin: 0;
                    visibility: hidden;
                    user-select: none;
                    -webkit-user-select: none;
                    -moz-user-select: none;
                    -ms-user-select: none;
                }
                #progress-wrapper {
                    display: flex;
                    align-items: center;
                    width: 100%;
                    flex: 1;
                    --thumb-size: 24px;
                    gap: 12px;
                    user-select: none;
                    -webkit-user-select: none;
                    -moz-user-select: none;
                    -ms-user-select: none;
                    transition: opacity 375ms ease-out;
                    position: relative;
                }
                #progress-ticks {
                    position: absolute;
                    left: calc(0.5 * var(--thumb-size));
                    right: calc(0.5 * var(--thumb-size));
                    bottom: -2px;
                    height: 4px;
                    pointer-events: none;
                }
                #progress-ticks .tick {
                    position: absolute;
                    bottom: 0;
                    width: 1px;
                    height: 3px;
                    background: currentColor;
                    opacity: 0.35;
                    transform: translateX(-0.5px);
                }
                #nav-section-progress-leading,
                #nav-section-progress-trailing {
                    position: absolute;
                    top: 0;
                    font-size: 10px !important;
                    line-height: 12px;
                    white-space: nowrap;
                    pointer-events: none;
                    direction: ltr;
                    unicode-bidi: isolate;
                }
                #nav-section-progress-leading {
                    left: var(--nav-horizontal-padding);
                    text-align: left;
                }
                #nav-section-progress-trailing {
                    right: var(--nav-horizontal-padding);
                    text-align: right;
                }
                #nav-section-progress-center {
                    position: absolute;
                    top: 0;
                    right: var(--nav-horizontal-padding);
                    left: auto;
                    transform: none;
                    display: inline-block;
                    width: max-content;
                    font-size: 10px !important;
                    line-height: 12px;
                    white-space: nowrap;
                    pointer-events: none;
                    direction: ltr;
                    unicode-bidi: isolate;
                    text-align: right;
                    max-width: calc(50vw - var(--nav-horizontal-padding) - 24px);
                    overflow-x: hidden;
                    overflow-y: visible;
                    text-overflow: ellipsis;
                }
                #nav-section-progress-center {
                    pointer-events: auto;
                }
                body[data-book-dir="rtl"] #nav-section-progress-center {
                    left: var(--nav-horizontal-padding);
                    right: auto;
                    text-align: left;
                }
                #page-tracking-container {
                    position: fixed;
                    bottom: var(--mnb-toolbar-physical-bottom-inset, 0px);
                    left: 50%;
                    right: auto;
                    transform: translateX(-50%);
                    display: flex;
                    align-items: flex-end;
                    justify-content: center;
                    min-width: 0;
                    z-index: 7;
                    pointer-events: auto;
                }
                #page-tracking-buttons {
                    display: flex;
                    flex-direction: row;
                    align-items: flex-end;
                    justify-content: center;
                    gap: 0;
                    min-width: 0;
                }
                body[data-book-dir="rtl"] #page-tracking-buttons {
                    align-items: center;
                }
                #page-tracking-buttons[hidden] {
                    display: none;
                }
                #nav-hidden-buttons {
                    position: absolute;
                    top: 0;
                    left: 0;
                    width: 1px;
                    height: 1px;
                    overflow: hidden;
                    clip: rect(0 0 0 0);
                    clip-path: inset(50%);
                    pointer-events: none;
                }
                #nav-hidden-buttons button {
                    position: absolute;
                    left: -9999px;
                }
                .page-read-button {
                    display: inline-flex;
                    align-items: center;
                    justify-content: center;
                    width: var(--page-read-button-height);
                    height: var(--page-read-button-height);
                    min-width: var(--page-read-button-height);
                    min-height: var(--page-read-button-height);
                    flex: 0 0 auto;
                    opacity: 1;
                    visibility: visible !important;
                    font-family: var(--mnb-ui-font-family) !important;
                    font-size: inherit;
                    box-sizing: content-box;
                    border-radius: 9999px;
                    border: 1px solid var(--theme-tracking-unread-color);
                    box-shadow: none;
                    margin: 0;
                    padding: 0;
                    gap: 0;
                    text-align: left;
                    direction: ltr;
                    unicode-bidi: isolate;
                    background-color: var(--theme-background-color);
                    color: var(--secondary-color);
                    -webkit-tap-highlight-color: transparent;
                    -webkit-appearance: none;
                    appearance: none;
                    -webkit-user-select: none;
                    user-select: none;
                    transition:
                        background-color 500ms ease-in-out,
                        border-color 240ms ease,
                        color 240ms ease,
                        opacity 240ms ease-in-out,
                        transform 240ms ease,
                        width 240ms ease,
                        padding 240ms ease,
                        gap 240ms ease,
                        border-radius 240ms ease;
                    overflow: hidden;
                    white-space: nowrap;
                }
                @media (hover: hover) and (pointer: fine) {
                    .page-read-button:hover:not(:disabled) {
                        border: 1px solid CanvasText;
                    }
                }
                .page-read-button:focus:not(:focus-visible) {
                    outline: none;
                }

                    transform: none;

                    width: 100%;
                    height: 100%;
